<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYC Event Outreach</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f0f4ff;
      color: #1a1a2e;
      min-height: 100vh;
    }

    .header {
      background: #2952cc;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-logo {
      width: 38px; height: 38px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 15px; color: #2952cc; flex-shrink: 0;
    }

    .header-title { font-weight: 700; font-size: 17px; color: #fff; }
    .header-sub { font-size: 12px; color: #a8c0ff; }

    .container { max-width: 880px; margin: 0 auto; padding: 32px 24px; }

    .mode-toggle { display: flex; gap: 10px; margin-bottom: 20px; }

    .toggle-btn {
      padding: 9px 20px; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 2px solid #2952cc; transition: all 0.15s; font-family: inherit;
    }
    .toggle-btn.active { background: #2952cc; color: #fff; }
    .toggle-btn.inactive { background: #fff; color: #2952cc; }

    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }

    .contact-btn {
      padding: 12px 16px; border-radius: 8px; cursor: pointer;
      text-align: left; border: 2px solid #dce8ff;
      background: #fff; transition: all 0.15s; font-family: inherit;
    }
    .contact-btn:hover { border-color: #2952cc; background: #f0f4ff; }
    .contact-btn.selected { border-color: #2952cc; background: #e8eeff; }
    .contact-btn .cn { font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 2px; }
    .contact-btn .cl { font-size: 11px; color: #6b7fa8; }

    .custom-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .custom-form .full { grid-column: 1 / -1; }

    label { font-size: 11px; color: #6b7fa8; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

    input, textarea {
      width: 100%; padding: 9px 12px; border-radius: 6px;
      border: 2px solid #dce8ff; background: #fff;
      color: #1a1a2e; font-size: 13px; font-family: inherit;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { outline: none; border-color: #2952cc; }
    textarea { resize: vertical; }

    .preview {
      background: #fff; border-radius: 10px;
      padding: 16px 18px; margin-bottom: 20px;
      border: 2px solid #dce8ff;
    }
    .preview-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .preview-name { font-weight: 700; font-size: 15px; color: #1a1a2e; }
    .preview-role { font-size: 13px; color: #6b7fa8; margin-left: 8px; }
    .preview-event { font-size: 11px; color: #2952cc; background: #e8eeff; padding: 3px 10px; border-radius: 20px; white-space: nowrap; font-weight: 600; }
    .preview-notes { font-size: 13px; color: #4a5568; line-height: 1.6; }

    .run-btn {
      width: 100%; padding: 13px; border-radius: 8px; border: none;
      background: #2952cc;
      color: #fff; font-weight: 700; font-size: 14px;
      cursor: pointer; margin-bottom: 24px; transition: all 0.2s;
      font-family: inherit; letter-spacing: 0.02em;
    }
    .run-btn:hover { background: #1e3fa8; }
    .run-btn:disabled { background: #b0c0e0; cursor: not-allowed; }

    .error {
      background: #fff0f0; border: 2px solid #ffb0b0;
      border-radius: 8px; padding: 14px; color: #c0392b;
      font-size: 13px; margin-bottom: 16px;
    }

    .result-card {
      background: #fff; border-radius: 10px;
      padding: 18px; border: 2px solid #dce8ff; margin-bottom: 16px;
    }

    .category-badge {
      color: #fff; font-size: 12px; font-weight: 700;
      padding: 4px 12px; border-radius: 20px;
      display: inline-block; margin-bottom: 12px; letter-spacing: 0.03em;
    }

    .angle { font-size: 14px; color: #2952cc; font-style: italic; font-weight: 500; }

    .flags {
      margin-top: 12px; padding: 10px 14px;
      background: #fffbea; border-radius: 6px;
      border: 2px solid #f6c90e;
    }
    .flags-label { font-size: 11px; font-weight: 700; color: #b8860b; text-transform: uppercase; letter-spacing: 0.05em; }
    .flags-text { font-size: 12px; color: #7a6000; }

    .email-tabs { background: #fff; border-radius: 10px; border: 2px solid #dce8ff; overflow: hidden; }
    .email-tab-nav { display: flex; border-bottom: 2px solid #dce8ff; background: #f0f4ff; }

    .email-tab-btn {
      flex: 1; padding: 11px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 600; background: transparent;
      color: #6b7fa8; border-bottom: 3px solid transparent;
      transition: all 0.15s; font-family: inherit;
    }
    .email-tab-btn.active { background: #fff; color: #2952cc; border-bottom-color: #2952cc; }

    .email-content { padding: 18px; display: none; }
    .email-content.active { display: block; }

    .email-label { font-size: 11px; color: #6b7fa8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .email-subject { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
    .email-body { font-size: 14px; color: #4a5568; line-height: 1.8; white-space: pre-wrap; }

    .hidden { display: none; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #ffffff60; border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">SYC</div>
  <div>
    <div class="header-title">Event Outreach System</div>
    <div class="header-sub">Phase 1 — Contact Classification + Email Drafting</div>
  </div>
</div>

<div class="container">

  <div class="mode-toggle">
    <button class="toggle-btn active" id="btn-test" onclick="switchMode('test')">Use test contact</button>
    <button class="toggle-btn inactive" id="btn-custom" onclick="switchMode('custom')">Enter custom contact</button>
  </div>

  <div id="test-mode">
    <div class="contact-grid" id="contact-grid"></div>

    <div class="preview hidden" id="preview">
      <div class="preview-top">
        <div>
          <span class="preview-name" id="p-name"></span>
          <span class="preview-role" id="p-role"></span>
        </div>
        <span class="preview-event" id="p-event"></span>
      </div>
      <div class="preview-notes" id="p-notes"></div>
    </div>
  </div>

  <div id="custom-mode" class="hidden">
    <div class="custom-form">
      <div><label>Name</label><input id="c-name" type="text" placeholder="Sarah Kim"></div>
      <div><label>Title</label><input id="c-title" type="text" placeholder="CEO"></div>
      <div><label>Company</label><input id="c-company" type="text" placeholder="FinFlow KK"></div>
      <div><label>Email</label><input id="c-email" type="text" placeholder="sarah@finflow.jp"></div>
      <div><label>Event</label><input id="c-event" type="text" placeholder="Tokyo Founders Summit"></div>
      <div><label>Date Met</label><input id="c-date" type="text" placeholder="2025-07-08"></div>
      <div class="full"><label>Notes</label><textarea id="c-notes" rows="4" placeholder="What did you talk about? What do they do? Why are they interesting?"></textarea></div>
    </div>
  </div>

  <button class="run-btn" id="run-btn" onclick="runClassification()" disabled>
    Run Classification
  </button>

  <div class="error hidden" id="error"></div>

  <div id="result" class="hidden">
    <div class="result-card">
      <span class="category-badge" id="r-category"></span>
      <div class="angle" id="r-angle"></div>
      <div class="flags hidden" id="r-flags">
        <span class="flags-label">Flags: </span>
        <span class="flags-text" id="r-flags-text"></span>
      </div>
    </div>

    <div class="email-tabs">
      <div class="email-tab-nav">
        <button class="email-tab-btn active" onclick="switchEmail('day1')">Day 1 Reconnect</button>
        <button class="email-tab-btn" onclick="switchEmail('day7')">Day 7 Value Add</button>
        <button class="email-tab-btn" onclick="switchEmail('day21')">Day 21 Check In</button>
      </div>
      <div class="email-content active" id="tab-day1">
        <div class="email-label">Subject</div>
        <div class="email-subject" id="d1-subject"></div>
        <div class="email-label">Body</div>
        <div class="email-body" id="d1-body"></div>
      </div>
      <div class="email-content" id="tab-day7">
        <div class="email-label">Subject</div>
        <div class="email-subject" id="d7-subject"></div>
        <div class="email-label">Body</div>
        <div class="email-body" id="d7-body"></div>
      </div>
      <div class="email-content" id="tab-day21">
        <div class="email-label">Subject</div>
        <div class="email-subject" id="d21-subject"></div>
        <div class="email-label">Body</div>
        <div class="email-body" id="d21-body"></div>
      </div>
    </div>
  </div>

</div>

<script>
  const contacts = {{ contacts | tojson }};
  let selectedContact = null;
  let currentMode = 'test';

  contacts.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'contact-btn';
    btn.id = 'contact-' + c.id;
    btn.innerHTML = `<div class="cn">${c.name}</div><div class="cl">${c.label}</div>`;
    btn.addEventListener('click', () => selectContact(c));
    document.getElementById('contact-grid').appendChild(btn);
  });

  const categoryColors = {
    founder_prospect: '#2952cc',
    investor: '#0891b2',
    press_media: '#7c3aed',
    corporate_partner: '#0d9488',
    service_provider: '#64748b',
    community_connector: '#d97706',
    other: '#94a3b8'
  };

  function switchMode(mode) {
    currentMode = mode;
    document.getElementById('test-mode').classList.toggle('hidden', mode !== 'test');
    document.getElementById('custom-mode').classList.toggle('hidden', mode !== 'custom');
    document.getElementById('btn-test').className = 'toggle-btn ' + (mode === 'test' ? 'active' : 'inactive');
    document.getElementById('btn-custom').className = 'toggle-btn ' + (mode === 'custom' ? 'active' : 'inactive');
    document.getElementById('run-btn').disabled = mode === 'test' && !selectedContact;
    if (mode === 'custom') document.getElementById('run-btn').disabled = false;
    document.getElementById('result').classList.add('hidden');
    document.getElementById('error').classList.add('hidden');
  }

  function selectContact(contact) {
    selectedContact = contact;
    document.querySelectorAll('.contact-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('contact-' + contact.id).classList.add('selected');
    document.getElementById('p-name').textContent = contact.name;
    document.getElementById('p-role').textContent = [contact.title, contact.company].filter(Boolean).join(' · ');
    document.getElementById('p-event').textContent = contact.event;
    document.getElementById('p-notes').textContent = contact.notes;
    document.getElementById('preview').classList.remove('hidden');
    document.getElementById('run-btn').disabled = false;
    document.getElementById('result').classList.add('hidden');
    document.getElementById('error').classList.add('hidden');
  }

  function switchEmail(day) {
    document.querySelectorAll('.email-tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['day1','day7','day21'][i] === day);
    });
    document.querySelectorAll('.email-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + day).classList.add('active');
  }

  async function runClassification() {
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Classifying and drafting emails...';
    document.getElementById('result').classList.add('hidden');
    document.getElementById('error').classList.add('hidden');

    let contact;
    if (currentMode === 'test') {
      contact = selectedContact;
    } else {
      contact = {
        name: document.getElementById('c-name').value,
        title: document.getElementById('c-title').value,
        company: document.getElementById('c-company').value,
        email: document.getElementById('c-email').value,
        event: document.getElementById('c-event').value,
        met_date: document.getElementById('c-date').value,
        notes: document.getElementById('c-notes').value,
      };
    }

    try {
      const res = await fetch('/classify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contact })
      });
      const data = await res.json();

      if (!data.success) throw new Error(data.error);

      const r = data.result;
      const cat = r.category?.replace(/_/g, ' ');
      const badge = document.getElementById('r-category');
      badge.textContent = cat;
      badge.style.background = categoryColors[r.category] || '#94a3b8';

      document.getElementById('r-angle').textContent = '"' + r.follow_up_angle + '"';

      if (r.flags) {
        document.getElementById('r-flags').classList.remove('hidden');
        document.getElementById('r-flags-text').textContent = r.flags;
      } else {
        document.getElementById('r-flags').classList.add('hidden');
      }

      document.getElementById('d1-subject').textContent = r.day1.subject;
      document.getElementById('d1-body').textContent = r.day1.body;
      document.getElementById('d7-subject').textContent = r.day7.subject;
      document.getElementById('d7-body').textContent = r.day7.body;
      document.getElementById('d21-subject').textContent = r.day21.subject;
      document.getElementById('d21-body').textContent = r.day21.body;

      switchEmail('day1');
      document.getElementById('result').classList.remove('hidden');

    } catch (e) {
      document.getElementById('error').textContent = 'Something went wrong: ' + e.message;
      document.getElementById('error').classList.remove('hidden');
    }

    btn.disabled = false;
    btn.innerHTML = 'Run Classification';
  }
</script>
</body>
</html>
