<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYC Event Outreach</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .header {
      background: #16161d;
      border-bottom: 1px solid #2a2a3a;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .header-title { font-weight: 700; font-size: 16px; color: #f1f5f9; }
    .header-sub { font-size: 12px; color: #64748b; }

    .container { max-width: 860px; margin: 0 auto; padding: 24px; }

    .section-title { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }

    .mode-toggle { display: flex; gap: 8px; margin-bottom: 16px; }

    .toggle-btn {
      padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; transition: all 0.15s;
    }
    .toggle-btn.active { background: #6366f1; color: #fff; }
    .toggle-btn.inactive { background: #1e1e2e; color: #94a3b8; }

    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }

    .contact-btn {
      padding: 10px 14px; border-radius: 8px; cursor: pointer;
      text-align: left; border: none; border-left: 3px solid #2a2a3a;
      background: #1a1a24; transition: all 0.15s;
    }
    .contact-btn:hover { background: #1e1e30; }
    .contact-btn.selected { background: #1e1e3a; border-left-color: #6366f1; }
    .contact-btn .cn { font-size: 12px; font-weight: 600; color: #e2e8f0; margin-bottom: 2px; }
    .contact-btn .cl { font-size: 11px; color: #64748b; }

    .custom-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .custom-form .full { grid-column: 1 / -1; }

    label { font-size: 11px; color: #64748b; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

    input, textarea {
      width: 100%; padding: 8px 10px; border-radius: 6px;
      border: 1px solid #2a2a3a; background: #1a1a24;
      color: #e2e8f0; font-size: 13px; font-family: inherit;
    }
    textarea { resize: vertical; }

    .preview {
      background: #1a1a24; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 16px;
      border: 1px solid #2a2a3a;
    }
    .preview-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .preview-name { font-weight: 600; font-size: 15px; color: #f1f5f9; }
    .preview-role { font-size: 13px; color: #64748b; margin-left: 8px; }
    .preview-event { font-size: 11px; color: #94a3b8; background: #0f0f13; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
    .preview-notes { font-size: 13px; color: #94a3b8; line-height: 1.6; }

    .run-btn {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-weight: 600; font-size: 14px;
      cursor: pointer; margin-bottom: 20px; transition: all 0.2s;
      font-family: inherit;
    }
    .run-btn:disabled { background: #2a2a3a; cursor: not-allowed; }

    .error {
      background: #2d1b1b; border: 1px solid #7f1d1d;
      border-radius: 8px; padding: 14px; color: #fca5a5;
      font-size: 13px; margin-bottom: 16px;
    }

    .result-card {
      background: #1a1a24; border-radius: 10px;
      padding: 16px; border: 1px solid #2a2a3a; margin-bottom: 14px;
    }

    .category-badge {
      color: #fff; font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      display: inline-block; margin-bottom: 10px;
    }

    .angle { font-size: 14px; color: #e2e8f0; font-style: italic; }

    .flags {
      margin-top: 10px; padding: 8px 12px;
      background: #1e1a0e; border-radius: 6px;
      border: 1px solid #78350f;
    }
    .flags-label { font-size: 11px; font-weight: 600; color: #fbbf24; text-transform: uppercase; letter-spacing: 0.05em; }
    .flags-text { font-size: 12px; color: #fcd34d; }

    .email-tabs { background: #1a1a24; border-radius: 10px; border: 1px solid #2a2a3a; overflow: hidden; }
    .email-tab-nav { display: flex; border-bottom: 1px solid #2a2a3a; }

    .email-tab-btn {
      flex: 1; padding: 10px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 500; background: transparent;
      color: #64748b; border-bottom: 2px solid transparent;
      transition: all 0.15s; font-family: inherit;
    }
    .email-tab-btn.active { background: #0f0f13; color: #818cf8; border-bottom-color: #6366f1; }

    .email-content { padding: 16px; display: none; }
    .email-content.active { display: block; }

    .email-label { font-size: 12px; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .email-subject { font-size: 14px; font-weight: 600; color: #e2e8f0; margin-bottom: 14px; }
    .email-body { font-size: 14px; color: #cbd5e1; line-height: 1.75; white-space: pre-wrap; }

    .hidden { display: none; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #ffffff40; border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">⚡</div>
  <div>
    <div class="header-title">SYC Event Outreach System</div>
    <div class="header-sub">Phase 1 — Contact Classification + Email Drafting</div>
  </div>
</div>

<div class="container">

  <div class="mode-toggle">
    <button class="toggle-btn active" id="btn-test" onclick="switchMode('test')">Use test contact</button>
    <button class="toggle-btn inactive" id="btn-custom" onclick="switchMode('custom')">Enter custom contact</button>
  </div>

  <!-- Test contacts -->
  <div id="test-mode">
    <div class="contact-grid">
      {% for c in contacts %}
      <button class="contact-btn" id="contact-{{ c.id }}" onclick="selectContact({{ c | tojson }})">
        <div class="cn">{{ c.name }}</div>
        <div class="cl">{{ c.label }}</div>
      </button>
      {% endfor %}
    </div>

    <div class="preview hidden" id="preview">
      <div class="preview-top">
        <div>
          <span class="preview-name" id="p-name"></span>
          <span class="preview-role" id="p-role"></span>
        </div>
        <span class="preview-event" id="p-event"></span>
      </div>
      <div class="preview-notes" id="p-notes"></div>
    </div>
  </div>

  <!-- Custom form -->
  <div id="custom-mode" class="hidden">
    <div class="custom-form">
      <div><label>Name</label><input id="c-name" type="text" placeholder="Sarah Kim"></div>
      <div><label>Title</label><input id="c-title" type="text" placeholder="CEO"></div>
      <div><label>Company</label><input id="c-company" type="text" placeholder="FinFlow KK"></div>
      <div><label>Email</label><input id="c-email" type="text" placeholder="sarah@finflow.jp"></div>
      <div><label>Event</label><input id="c-event" type="text" placeholder="Tokyo Founders Summit"></div>
      <div><label>Date Met</label><input id="c-date" type="text" placeholder="2025-07-08"></div>
      <div class="full"><label>Notes</label><textarea id="c-notes" rows="4" placeholder="What did you talk about? What do they do? Why are they interesting?"></textarea></div>
    </div>
  </div>

  <button class="run-btn" id="run-btn" onclick="runClassification()" disabled>
    Run Classification →
  </button>

  <div class="error hidden" id="error"></div>

  <div id="result" class="hidden">
    <div class="result-card">
      <span class="category-badge" id="r-category"></span>
      <div class="angle" id="r-angle"></div>
      <div class="flags hidden" id="r-flags">
        <span class="flags-label">⚠ Flags: </span>
        <span class="flags-text" id="r-flags-text"></span>
      </div>
    </div>

    <div class="email-tabs">
      <div class="email-tab-nav">
        <button class="email-tab-btn active" onclick="switchEmail('day1')">Day 1 — Reconnect</button>
        <button class="email-tab-btn" onclick="switchEmail('day7')">Day 7 — Value-add</button>
        <button class="email-tab-btn" onclick="switchEmail('day21')">Day 21 — Check-in</button>
      </div>
      <div class="email-content active" id="tab-day1">
        <div class="email-label">Subject</div>
        <div class="email-subject" id="d1-subject"></div>
        <div class="email-label">Body</div>
        <div class="email-body" id="d1-body"></div>
      </div>
      <div class="email-content" id="tab-day7">
        <div class="email-label">Subject</div>
        <div class="email-subject" id="d7-subject"></div>
        <div class="email-label">Body</div>
        <div class="email-body" id="d7-body"></div>
      </div>
      <div class="email-content" id="tab-day21">
        <div class="email-label">Subject</div>
        <div class="email-subject" id="d21-subject"></div>
        <div class="email-label">Body</div>
        <div class="email-body" id="d21-body"></div>
      </div>
    </div>
  </div>

</div>

<script>
  let selectedContact = null;
  let currentMode = 'test';

  const categoryColors = {
    founder_prospect: '#6366f1',
    investor: '#0ea5e9',
    press_media: '#8b5cf6',
    corporate_partner: '#0d9488',
    service_provider: '#64748b',
    community_connector: '#f59e0b',
    other: '#94a3b8'
  };

  function switchMode(mode) {
    currentMode = mode;
    document.getElementById('test-mode').classList.toggle('hidden', mode !== 'test');
    document.getElementById('custom-mode').classList.toggle('hidden', mode !== 'custom');
    document.getElementById('btn-test').className = 'toggle-btn ' + (mode === 'test' ? 'active' : 'inactive');
    document.getElementById('btn-custom').className = 'toggle-btn ' + (mode === 'custom' ? 'active' : 'inactive');
    document.getElementById('run-btn').disabled = mode === 'test' && !selectedContact;
    if (mode === 'custom') document.getElementById('run-btn').disabled = false;
    document.getElementById('result').classList.add('hidden');
    document.getElementById('error').classList.add('hidden');
  }

  function selectContact(contact) {
    selectedContact = contact;
    document.querySelectorAll('.contact-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('contact-' + contact.id).classList.add('selected');
    document.getElementById('p-name').textContent = contact.name;
    document.getElementById('p-role').textContent = [contact.title, contact.company].filter(Boolean).join(' · ');
    document.getElementById('p-event').textContent = contact.event;
    document.getElementById('p-notes').textContent = contact.notes;
    document.getElementById('preview').classList.remove('hidden');
    document.getElementById('run-btn').disabled = false;
    document.getElementById('result').classList.add('hidden');
    document.getElementById('error').classList.add('hidden');
  }

  function switchEmail(day) {
    document.querySelectorAll('.email-tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['day1','day7','day21'][i] === day);
    });
    document.querySelectorAll('.email-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + day).classList.add('active');
  }

  async function runClassification() {
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Classifying + drafting emails...';
    document.getElementById('result').classList.add('hidden');
    document.getElementById('error').classList.add('hidden');

    let contact;
    if (currentMode === 'test') {
      contact = selectedContact;
    } else {
      contact = {
        name: document.getElementById('c-name').value,
        title: document.getElementById('c-title').value,
        company: document.getElementById('c-company').value,
        email: document.getElementById('c-email').value,
        event: document.getElementById('c-event').value,
        met_date: document.getElementById('c-date').value,
        notes: document.getElementById('c-notes').value,
      };
    }

    try {
      const res = await fetch('/classify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contact })
      });
      const data = await res.json();

      if (!data.success) throw new Error(data.error);

      const r = data.result;
      const cat = r.category?.replace(/_/g, ' ');
      const badge = document.getElementById('r-category');
      badge.textContent = cat;
      badge.style.background = categoryColors[r.category] || '#94a3b8';

      document.getElementById('r-angle').textContent = '"' + r.follow_up_angle + '"';

      if (r.flags) {
        document.getElementById('r-flags').classList.remove('hidden');
        document.getElementById('r-flags-text').textContent = r.flags;
      } else {
        document.getElementById('r-flags').classList.add('hidden');
      }

      document.getElementById('d1-subject').textContent = r.day1.subject;
      document.getElementById('d1-body').textContent = r.day1.body;
      document.getElementById('d7-subject').textContent = r.day7.subject;
      document.getElementById('d7-body').textContent = r.day7.body;
      document.getElementById('d21-subject').textContent = r.day21.subject;
      document.getElementById('d21-body').textContent = r.day21.body;

      switchEmail('day1');
      document.getElementById('result').classList.remove('hidden');

    } catch (e) {
      document.getElementById('error').textContent = 'Something went wrong: ' + e.message;
      document.getElementById('error').classList.remove('hidden');
    }

    btn.disabled = false;
    btn.innerHTML = 'Run Classification →';
  }
</script>
</body>
</html>
