<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYC Contact Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      border: 2px solid #dce8ff;
      border-radius: 14px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo {
      width: 48px; height: 48px;
      background: #2952cc;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 16px; color: #fff;
      margin: 0 auto 16px;
    }
    h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
    p { font-size: 13px; color: #6b7fa8; margin-bottom: 28px; }
    label { font-size: 11px; color: #6b7fa8; display: block; margin-bottom: 6px; text-align: left; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 2px solid #dce8ff; font-size: 14px;
      font-family: inherit; color: #1a1a2e; margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #2952cc; }
    button {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      background: #2952cc; color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    button:hover { background: #1e3fa8; }
    .error { color: #c0392b; font-size: 13px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">SYC</div>
    <h1>SYC Contact Hub</h1>
    <p>Internal tool — SYC team only</p>
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Sign In</button>
    <div class="error" id="error">Incorrect password. Try again.</div>
  </div>

  <script>
    async function login() {
      const password = document.getElementById('password').value;
      const err = document.getElementById('error');
      err.style.display = 'none';

      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();

      if (data.success) {
        window.location.href = '/';
      } else {
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
